name: Deploy Icon Preview

on:
  pull_request:
    branches:
      - master
    paths:
      - "icons*.json"
      - "fonts/*.ttf"
      - "index.html"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare preview bundle
        run: |
          mkdir -p dist/fonts
          cp index.html dist/
          cp icons*.json dist/
          cp fonts/*.ttf dist/fonts/

      - name: Deploy Preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: /
          preview-branch: gh-pages
          qr-code: false