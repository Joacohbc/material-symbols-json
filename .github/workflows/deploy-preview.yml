name: Deploy Icon Preview

on:
  push:
    branches:
      - master
    paths:
      - "icons*.json"
      - "fonts/*.ttf"
      - "index.html"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare preview bundle
        run: |
          mkdir -p dist/fonts
          cp index.html dist/
          cp icons*.json dist/
          cp fonts/*.ttf dist/fonts/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "chore(preview): update icon preview site"
