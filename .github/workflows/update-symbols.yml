name: Update Material Symbols

on:
  schedule:
    - cron: "0 0 * * 0" # Every Sunday at midnight UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-symbols:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run download and process script
        run: bash download_fonts.sh

      - name: Update default icons.json
        run: node from_font.js fonts/MaterialSymbolsOutlined.ttf icons.json

      - name: Get timestamp
        id: timestamp
        run: echo "ts=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(data): auto-update material symbols"
          branch: update/${{ steps.timestamp.outputs.ts }}
          title: "chore(data): auto-update material symbols"
          body: |
            Automated update of Material Symbols fonts and JSON definitions.

            Variants updated:
            - Outlined
            - Rounded
            - Sharp
          add-paths: |
            icons.json
            icons-outlined.json
            icons-rounded.json
            icons-sharp.json
