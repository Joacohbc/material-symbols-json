name: Update Material Symbols JSON

on:
  schedule:
    # Ejecuta todos los días a la medianoche (UTC)
    - cron: '0 0 * * *'
  # Permite ejecutar el workflow manualmente desde la pestaña Actions de GitHub
  workflow_dispatch:

jobs:
  update-symbols:
    runs-on: ubuntu-latest

    # Necesario para que el action pueda hacer push
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        run: node update_symbols.js

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): auto-update material symbols json"
          file_pattern: "symbols.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
