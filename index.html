<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Material Symbols</title>
  <style>
    @font-face {
      font-family: 'Material Symbols Outlined';
      src: url('./MaterialSymbolsOutlined-VariableFont_FILL,GRAD,opsz,wght.ttf') format('truetype');
      font-weight: 100 700;
      font-style: normal;
    }

    body {
      margin: 0;
      background: #111;
      color: #eee;
      font-family: sans-serif;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px;
      padding: 16px;
    }

    .icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 12px 4px;
      border-radius: 8px;
      background: #1a1a1a;
    }

    .icon span:first-child {
      font-family: 'Material Symbols Outlined';
      font-size: 32px;
    }

    .icon span:last-child {
      font-size: 0.6rem;
      color: #888;
      text-align: center;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <div id="grid"></div>
  <script>
    fetch('./icons.json').then(r => r.json()).then(icons => {
      const grid = document.getElementById('grid');
      const f = document.createDocumentFragment();
      for (const [name, codepoint] of Object.entries(icons)) {
        const div = document.createElement('div');
        div.className = 'icon';
        const sym = document.createElement('span');
        sym.textContent = String.fromCodePoint(codepoint);
        const lbl = document.createElement('span');
        lbl.textContent = name;
        div.appendChild(sym);
        div.appendChild(lbl);
        f.appendChild(div);
      }
      grid.appendChild(f);
    });
  </script>
</body>

</html>
